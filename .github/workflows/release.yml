name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: ./gradlew clean check

      - name: Generate checksum
        run: |
          cd build/distributions
          sha256sum uyghur-analyzer-plugin-2.0.0-es8.zip > uyghur-analyzer-plugin-2.0.0-es8.zip.sha256

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/distributions/uyghur-analyzer-plugin-2.0.0-es8.zip
            build/distributions/uyghur-analyzer-plugin-2.0.0-es8.zip.sha256
          generate_release_notes: true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: uyghur-analyzer-plugin-release
          path: |
            build/distributions/uyghur-analyzer-plugin-2.0.0-es8.zip
            build/distributions/uyghur-analyzer-plugin-2.0.0-es8.zip.sha256
