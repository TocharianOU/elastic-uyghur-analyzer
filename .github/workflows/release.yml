name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - es-major: "8"
            elasticsearch-version: "8.7.0"
            lucene-version: "9.5.0"
            java-version: "17"
            artifact: "uyghur-analyzer-plugin-2.1.0-es8.zip"
          - es-major: "9"
            elasticsearch-version: "9.4.0"
            lucene-version: "10.4.0"
            java-version: "24"
            artifact: "uyghur-analyzer-plugin-2.1.0-es9.zip"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: |
          if [ "${{ matrix.es-major }}" = "9" ]; then
            curl -fsSL https://services.gradle.org/distributions/gradle-8.14-bin.zip -o /tmp/gradle-8.14-bin.zip
            unzip -q /tmp/gradle-8.14-bin.zip -d /tmp
            GRADLE_CMD=/tmp/gradle-8.14/bin/gradle
          else
            GRADLE_CMD=./gradlew
          fi

          "$GRADLE_CMD" clean check \
            -PesMajor=${{ matrix.es-major }} \
            -PelasticsearchVersion=${{ matrix.elasticsearch-version }} \
            -PluceneVersion=${{ matrix.lucene-version }}

      - name: Generate checksum
        run: |
          cd build/distributions
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: uyghur-analyzer-plugin-release-es${{ matrix.es-major }}
          path: |
            build/distributions/${{ matrix.artifact }}
            build/distributions/${{ matrix.artifact }}.sha256

  release:
    needs: build-release-assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: uyghur-analyzer-plugin-release-es*
          path: release-assets
          merge-multiple: true

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
