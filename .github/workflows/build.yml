name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - es-major: "8"
            elasticsearch-version: "8.7.0"
            lucene-version: "9.5.0"
            java-version: "17"
            artifact: "uyghur-analyzer-plugin-2.4.0-es8.zip"
          - es-major: "9"
            elasticsearch-version: "9.4.0"
            lucene-version: "10.4.0"
            java-version: "24"
            artifact: "uyghur-analyzer-plugin-2.4.0-es9.zip"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test
        run: |
          if [ "${{ matrix.es-major }}" = "9" ]; then
            curl -fsSL https://services.gradle.org/distributions/gradle-8.14-bin.zip -o /tmp/gradle-8.14-bin.zip
            unzip -q /tmp/gradle-8.14-bin.zip -d /tmp
            GRADLE_CMD=/tmp/gradle-8.14/bin/gradle
          else
            GRADLE_CMD=./gradlew
          fi

          "$GRADLE_CMD" clean check \
            -PesMajor=${{ matrix.es-major }} \
            -PelasticsearchVersion=${{ matrix.elasticsearch-version }} \
            -PluceneVersion=${{ matrix.lucene-version }}

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: uyghur-analyzer-plugin-es${{ matrix.es-major }}
          path: build/distributions/${{ matrix.artifact }}

  smoke-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - es-major: "8"
            elasticsearch-version: "8.7.0"
            artifact: "uyghur-analyzer-plugin-2.4.0-es8.zip"
          - es-major: "8"
            elasticsearch-version: "8.19.15"
            artifact: "uyghur-analyzer-plugin-2.4.0-es8.zip"
          - es-major: "9"
            elasticsearch-version: "9.4.0"
            artifact: "uyghur-analyzer-plugin-2.4.0-es9.zip"

    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: uyghur-analyzer-plugin-es${{ matrix.es-major }}
          path: dist

      - name: Start Elasticsearch with plugin
        run: |
          set -euo pipefail

          docker run -d --name es-smoke \
            -p 9200:9200 \
            -e discovery.type=single-node \
            -e xpack.security.enabled=false \
            -e ES_JAVA_OPTS="-Xms512m -Xmx512m" \
            -v "$PWD/dist/${{ matrix.artifact }}:/tmp/uyghur-analyzer-plugin.zip:ro" \
            docker.elastic.co/elasticsearch/elasticsearch:${{ matrix.elasticsearch-version }} \
            bash -lc 'bin/elasticsearch-plugin install --batch file:///tmp/uyghur-analyzer-plugin.zip && exec bin/elasticsearch'

          for i in {1..90}; do
            if curl -fsS "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s" >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker logs es-smoke
          exit 1

      - name: Verify plugin and analyzers
        run: |
          set -euo pipefail

          curl -fsS "http://localhost:9200/_cat/plugins?v" | tee plugins.txt
          grep -q "uyghur-analyzer-plugin" plugins.txt

          curl -fsS -X POST "http://localhost:9200/_analyze" \
            -H "Content-Type: application/json" \
            -d '{"analyzer":"uyghur_original_analyzer","text":"ئائىلىدىكى"}' \
            | tee original.json
          grep -q "ئائىلە" original.json
          grep -q "دىكى" original.json

          curl -fsS -X POST "http://localhost:9200/_analyze" \
            -H "Content-Type: application/json" \
            -d '{"analyzer":"uyghur_split_analyzer","text":"ئائىلىدىكى"}' \
            | tee split.json
          grep -q "ئائىلى" split.json
          grep -q "دىكى" split.json

      - name: Dump Elasticsearch logs on failure
        if: failure()
        run: docker logs es-smoke || true

      - name: Stop Elasticsearch
        if: always()
        run: docker rm -f es-smoke || true
